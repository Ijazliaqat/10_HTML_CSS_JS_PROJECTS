<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>04 · Theme Toggle Landing</title>
    <!-- Load Tailwind first, THEN set the config (order matters for the Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  </head>
  <body
    class="min-h-screen bg-white text-slate-900 dark:bg-slate-950 dark:text-white transition-colors duration-500"
  >
    <!-- NAV -->
    <nav class="flex items-center justify-between px-6 md:px-16 py-6">
      <span class="text-xl font-bold"
        >Lumen<span class="text-amber-500 dark:text-indigo-400">.</span></span
      >

      <!-- theme toggle switch -->
      <button
        id="themeToggle"
        class="relative w-16 h-8 rounded-full bg-slate-200 dark:bg-slate-800 transition-colors duration-500 flex items-center px-1"
      >
        <!-- knob -->
        <span
          id="knob"
          class="w-6 h-6 rounded-full bg-amber-400 dark:bg-indigo-400 shadow flex items-center justify-center text-xs"
        >
          <span id="knobIcon">☀️</span>
        </span>
      </button>
    </nav>

    <!-- HERO -->
    <main class="max-w-3xl mx-auto text-center px-6 pt-24 md:pt-32">
      <h1
        data-reveal
        class="text-4xl md:text-6xl font-extrabold leading-tight mb-6"
      >
        One click to switch<br />
        <span class="text-amber-500 dark:text-indigo-400"
          >light &amp; dark</span
        >
      </h1>
      <p data-reveal class="text-slate-500 dark:text-slate-400 text-lg mb-10">
        A landing page that responds to your theme. Toggle the switch in the
        top-right corner.
      </p>
      <div data-reveal class="flex gap-4 justify-center">
        <button
          class="bg-amber-500 dark:bg-indigo-500 hover:opacity-90 transition text-white px-8 py-3 rounded-xl font-semibold"
        >
          Try it
        </button>
        <button
          class="border border-slate-300 dark:border-slate-700 px-8 py-3 rounded-xl font-semibold"
        >
          Learn more
        </button>
      </div>

      <!-- cards -->
      <div class="grid sm:grid-cols-3 gap-4 mt-20">
        <div
          data-reveal
          class="bg-slate-100 dark:bg-white/5 border border-transparent dark:border-white/10 rounded-2xl p-6"
        >
          <div class="text-3xl mb-2">⚡</div>
          <h3 class="font-semibold">Fast</h3>
        </div>
        <div
          data-reveal
          class="bg-slate-100 dark:bg-white/5 border border-transparent dark:border-white/10 rounded-2xl p-6"
        >
          <div class="text-3xl mb-2">�</div>
          <h3 class="font-semibold">Beautiful</h3>
        </div>
        <div
          data-reveal
          class="bg-slate-100 dark:bg-white/5 border border-transparent dark:border-white/10 rounded-2xl p-6"
        >
          <div class="text-3xl mb-2">�</div>
          <h3 class="font-semibold">Responsive</h3>
        </div>
      </div>
    </main>
    <script>
      // ===== 04 · Theme Toggle Landing =====

      const html = document.documentElement;
      const toggle = document.getElementById("themeToggle");
      const knob = document.getElementById("knob");
      const knobIcon = document.getElementById("knobIcon");

      // entrance
      gsap.from("[data-reveal]", {
        y: 30,
        opacity: 0,
        duration: 0.7,
        stagger: 0.1,
        ease: "power3.out",
      });

      // remember the user's choice across page reloads
      const saved = localStorage.getItem("theme");
      if (saved === "dark") setDark(true, false);

      toggle.addEventListener("click", () => {
        const goingDark = !html.classList.contains("dark");
        setDark(goingDark, true);
      });

      function setDark(isDark, animate) {
        html.classList.toggle("dark", isDark);
        localStorage.setItem("theme", isDark ? "dark" : "light");
        knobIcon.textContent = isDark ? "�" : "☀️";

        // slide the knob (16px track width minus knob = ~32px travel)
        gsap.to(knob, {
          x: isDark ? 32 : 0,
          duration: animate ? 0.35 : 0,
          ease: "back.out(1.7)",
        });

        // little spin on the icon for flair
        if (animate)
          gsap.fromTo(
            knobIcon,
            { rotate: -180, scale: 0.5 },
            { rotate: 0, scale: 1, duration: 0.4 },
          );
      }

      // TODO: try respecting the OS theme with window.matchMedia("(prefers-color-scheme: dark)")
    </script>
  </body>
</html>
