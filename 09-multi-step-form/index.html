<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>09 · Multi-Step Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  </head>
  <body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
    <div
      class="w-full max-w-lg bg-white rounded-3xl shadow-xl p-8 overflow-hidden"
    >
      <!-- progress bar -->
      <div class="mb-8">
        <div
          class="flex justify-between text-xs font-medium text-slate-500 mb-2"
        >
          <span>Step <span id="stepNum">1</span> of 3</span>
          <span id="stepLabel">Account</span>
        </div>
        <div class="h-2 bg-slate-200 rounded-full overflow-hidden">
          <div id="bar" class="h-full w-1/3 bg-indigo-500 rounded-full"></div>
        </div>
      </div>

      <!-- steps: only one visible at a time -->
      <div id="steps">
        <div class="step" data-label="Account">
          <h2 class="text-xl font-bold mb-1">Create your account</h2>
          <p class="text-slate-500 text-sm mb-5">
            Let's start with the basics.
          </p>
          <input
            placeholder="Full name"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 mb-3 outline-none focus:border-indigo-500 transition"
          />
          <input
            placeholder="Email address"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition"
          />
        </div>

        <div class="step hidden" data-label="Profile">
          <h2 class="text-xl font-bold mb-1">Your profile</h2>
          <p class="text-slate-500 text-sm mb-5">
            Tell us a little about yourself.
          </p>
          <input
            placeholder="Username"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 mb-3 outline-none focus:border-indigo-500 transition"
          />
          <textarea
            placeholder="Short bio"
            rows="3"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition"
          ></textarea>
        </div>

        <div class="step hidden" data-label="Done">
          <h2 class="text-xl font-bold mb-1">Almost there!</h2>
          <p class="text-slate-500 text-sm mb-5">
            Review and confirm your details.
          </p>
          <div
            class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm text-slate-600"
          >
            � Everything looks good. Hit <b>Finish</b> to complete signup.
          </div>
        </div>
      </div>

      <!-- nav buttons -->
      <div class="flex justify-between mt-8">
        <button
          id="prevBtn"
          class="px-5 py-2.5 rounded-xl font-medium text-slate-500 hover:text-slate-900 transition invisible"
        >
          ← Back
        </button>
        <button
          id="nextBtn"
          class="px-6 py-2.5 rounded-xl font-semibold bg-indigo-600 hover:bg-indigo-500 text-white transition"
        >
          Next →
        </button>
      </div>
    </div>
    <script>
      // ===== 09 · Multi-Step Form =====

      const steps = document.querySelectorAll(".step");
      const bar = document.getElementById("bar");
      const stepNum = document.getElementById("stepNum");
      const stepLabel = document.getElementById("stepLabel");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");

      let current = 0; // index of the visible step

      // entrance
      gsap.from(".step:first-child", {
        y: 20,
        opacity: 0,
        duration: 0.5,
        ease: "power2.out",
      });

      nextBtn.addEventListener("click", () => {
        if (current < steps.length - 1) {
          goTo(current + 1, "next");
        } else {
          finish();
        }
      });

      prevBtn.addEventListener("click", () => {
        if (current > 0) goTo(current - 1, "prev");
      });

      function goTo(index, direction) {
        const outgoing = steps[current];
        const incoming = steps[index];

        // slide outgoing away, then reveal incoming from the other side
        const dir = direction === "next" ? -40 : 40;
        gsap.to(outgoing, {
          x: dir,
          opacity: 0,
          duration: 0.25,
          ease: "power2.in",
          onComplete: () => {
            outgoing.classList.add("hidden");
            incoming.classList.remove("hidden");
            gsap.fromTo(
              incoming,
              { x: -dir, opacity: 0 },
              { x: 0, opacity: 1, duration: 0.35, ease: "power2.out" },
            );
          },
        });

        current = index;
        updateUI();
      }

      function updateUI() {
        const pct = ((current + 1) / steps.length) * 100;
        gsap.to(bar, { width: `${pct}%`, duration: 0.4, ease: "power2.out" });

        stepNum.textContent = current + 1;
        stepLabel.textContent = steps[current].dataset.label;

        // show/hide Back button
        prevBtn.classList.toggle("invisible", current === 0);

        // change Next -> Finish on last step
        nextBtn.textContent =
          current === steps.length - 1 ? "Finish ✓" : "Next →";
      }

      function finish() {
        gsap.to("#steps", {
          scale: 0.95,
          opacity: 0.5,
          duration: 0.2,
          yoyo: true,
          repeat: 1,
        });
        // TODO: submit the collected data to your backend here
        alert("Form submitted! � (wire this up to your backend)");
      }
    </script>
  </body>
</html>
